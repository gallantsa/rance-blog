version: '3'

volumes:
  static:
  database:

services:
  rance-blog:
    build:
      context: .
      dockerfile: compose/production/django/Dockerfile
    image: rance-blog
    container_name: rance-blog
    working_dir: /app
    volumes:
      - database:/app/database
      - static:/app/static
    env_file:
      - .envs/.production
    ports:
      - "8000:8000"
    command: /start.sh

  rance-blog-nginx:
    build:
      context: .
      dockerfile: compose/production/nginx/Dockerfile
    image: rance-blog-nginx
    container_name: rance-blog-nginx
    volumes:
      - static:/app/static
    ports:
      - "80:80"
      - "443:443"